<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    
    <form style="position: relative; z-index: 1; color: white;">
        <fieldset>
            <legend>Registration Form</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Name" required><br>
            
            <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Email" required><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Password" required><br>
        
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" placeholder="Date of Birth" required><br>
        
        <label for="gender">College:</label>
        <input type="text" id="college" placeholder="College" required><br>

        <select id="course" required>
            <option value="">Select Course</option>
            <option value="btech">B.Tech</option>
            <option value="mtech">M.Tech</option>
            <option value="phd">PhD</option>
        </select><br><br>
    </fieldset>
    <fieldset>
        <legend>Additional Information</legend>
        <p>Residence:</p>
        <input id = "1year" type="radio" name="experience" value="1year" required>
        <label for="1year">Hostel</label>
        <input id = "2year" type="radio" name="experience" value="2year" required>
        <label for="2year">Not Hostel</label><br>
        
        <INPUT ID = "agree" TYPE = "CHECKBOX" NAME = "agree" VALUE = "agree" REQUIRED>
            <LABEL FOR = "agree"> I agree to the terms and conditions</LABEL><br>
            <input type="submit" value="Submit">
            
                </fieldset>
        </form>
        <video style="position: fixed; right: 0; bottom: 0; min-height: 100%; min-width: 100%; object-fit: cover; z-index: -1;" src="Untitled video - Made with Clipchamp.mp4" autoplay muted loop></video>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/4DfVxVeqk2o?si=BEySHAksv3G6WNF5" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
